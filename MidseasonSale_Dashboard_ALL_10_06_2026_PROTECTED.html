                ];

                // Write file
                XLSX.writeFile(wb, "Midseason_Sale_V26.xlsx");
                console.log('Excel file downloaded successfully');
            } catch (error) {
                console.error('Download error:', error);
                alert('Error downloading file. Please try again.');
            }
        });

        // Download CSV function
        document.getElementById('download-csv-btn').addEventListener('click', function() {
            try {
                const headers = ['Artículo', 'Familia', 'Sexo', 'Referencia', 'Color', 'Precio Actual', 'Precio Rebaja', 'Descuento %'];
                
                let csv = headers.join(';') + '\n';
                
                items.forEach(item => {
                    csv += [
                        item.article,
                        item.familia,
                        item.sexo,
                        item.referencia,
                        item.color,
                        item.precio_actual,
                        item.precio_rebaja,
                        (Math.abs(item.descuento) * 100).toFixed(2)
                    ].join(';') + '\n';
                });

                // Create blob and download
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement('a');
                const url = URL.createObjectURL(blob);
                link.setAttribute('href', url);
                link.setAttribute('download', 'Midseason_Sale_V26.csv');
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                console.log('CSV file downloaded successfully');
            } catch (error) {
                console.error('Download error:', error);
                alert('Error downloading file. Please try again.');
            }
        });
    </script>

    <script>
        const correctPassword = "koroshi2026";
        
        function checkPassword() {
            const input = document.getElementById('password-input').value;
            if (input === correctPassword) {
                localStorage.setItem('koroshi-dashboard-auth', 'true');
                document.getElementById('password-overlay').style.display = 'none';
            } else {
                alert('Incorrect password. Please try again.');
                document.getElementById('password-input').value = '';
            }
        }
        
        // Allow Enter key
        document.getElementById('password-input').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                checkPassword();
            }
        });
        
        // Check if already authenticated
        window.addEventListener('load', function() {

        });
