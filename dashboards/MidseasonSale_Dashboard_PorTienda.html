let currentItems = [];

// Populate store dropdown
const sel = document.getElementById('store-select');
STORES.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s.id;
    opt.textContent = s.name;
    sel.appendChild(opt);
});

sel.addEventListener('change', () => {
    const storeId = parseInt(sel.value);
    if (!storeId) {
        currentItems = [];
        document.getElementById('store-stats').style.display = 'none';
        renderEmpty();
        return;
    }
    currentItems = ALL_ITEMS.filter(i => i.store_id === storeId);
    renderGrid(currentItems);
});

function renderEmpty() {
    document.getElementById('container').innerHTML = `
        <div class="empty-state">
            <div class="icon">🏪</div>
            <p>Selecciona una tienda para ver los artículos en rebajas con stock</p>
        </div>`;
}

function renderGrid(items) {
    const statsEl = document.getElementById('store-stats');
    const totalUnits = items.reduce((s, i) => s + i.stock, 0);
    document.getElementById('stat-items').textContent = items.length;
    document.getElementById('stat-units').textContent = totalUnits.toLocaleString('es-ES');
    statsEl.style.display = 'flex';

    if (items.length === 0) {
        document.getElementById('container').innerHTML = `
            <div class="empty-state">
                <div class="icon">📦</div>
                <p>Esta tienda no tiene artículos en rebajas con stock</p>
            </div>`;
        return;
    }

    const cards = items.map(item => {
        const discPct = item.disc > 0 ? Math.round(item.disc * 100) : 0;
        const imgUrl = `https://koroshishop.com/cdn/shop/files/${item.referencia}_1.jpg`;
        return `
        <div class="card">
            <div class="image-wrapper">
                <img src="${imgUrl}" alt="${item.referencia}" class="image"
                     onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                <div class="no-image" style="display:none">Sin imagen</div>
                <div class="stock-badge">${item.stock} uds</div>
            </div>
            <div class="info">
                <div class="familia">${item.familia}</div>
                <div class="article-name">${item.desc_art}</div>
                <div class="article-ref">${item.article}</div>
                <div class="color-desc">${item.desc_col}</div>
                <div class="prices">
                    <div class="price-row">
                        <span class="price-label">PVP</span>
                        <span class="pvp-val">€${item.pvp.toFixed(2)}</span>
                    </div>
                    <div class="price-row">
                        <span class="sale-val">€${item.sale.toFixed(2)}</span>
                        ${discPct > 0 ? `<span class="disc-badge">-${discPct}%</span>` : ''}
                    </div>
                </div>
            </div>
        </div>`;
    }).join('');

    document.getElementById('container').innerHTML = `<div class="grid">${cards}</div>`;
}

// Download Excel
document.getElementById('download-btn').addEventListener('click', () => {
    if (!currentItems.length) { alert('Selecciona una tienda primero'); return; }
    const storeName = STORES.find(s => s.id === currentItems[0].store_id)?.name || 'tienda';
    const data = currentItems.map(i => ({
        'Artículo': i.article,
        'Color': i.color,
        'Referencia': i.referencia,
        'Descripción': i.desc_art,
        'Color Desc': i.desc_col,
        'Familia': i.familia,
        'Stock': i.stock,
        'PVP Original': i.pvp,
        'Precio Rebaja': i.sale,
        'Descuento %': (i.disc * 100).toFixed(1)
    }));
    const ws = XLSX.utils.json_to_sheet(data);
    ws['!cols'] = [14,8,20,30,20,25,8,12,12,10].map(w => ({ wch: w }));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Midseason');
    XLSX.writeFile(wb, `Midseason_Sale_${storeName.replace(/[^a-zA-Z0-9]/g,'_')}.xlsx`);
});

// Download CSV
document.getElementById('download-csv-btn').addEventListener('click', () => {
    if (!currentItems.length) { alert('Selecciona una tienda primero'); return; }
    const storeName = STORES.find(s => s.id === currentItems[0].store_id)?.name || 'tienda';
    const headers = ['Artículo','Color','Referencia','Descripción','Color Desc','Familia','Stock','PVP Original','Precio Rebaja','Descuento %'];
    let csv = headers.join(';') + '\n';
    currentItems.forEach(i => {
        csv += [i.article, i.color, i.referencia, i.desc_art, i.desc_col, i.familia,
                i.stock, i.pvp, i.sale, (i.disc*100).toFixed(1)].join(';') + '\n';
    });
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `Midseason_Sale_${storeName.replace(/[^a-zA-Z0-9]/g,'_')}.csv`;
    a.click();
});
</script>

<script>
const PW = "koroshi2026";
function checkPw() {
    if (document.getElementById('pw-input').value === PW) {
        sessionStorage.setItem('koroshi-auth', 'true');
        document.getElementById('pw-overlay').style.display = 'none';
    } else {
        alert('Contraseña incorrecta');
        document.getElementById('pw-input').value = '';
    }
}
document.getElementById('pw-input').addEventListener('keypress', e => { if (e.key === 'Enter') checkPw(); });
window.addEventListener('load', () => {
    if (sessionStorage.getItem('koroshi-auth') !== 'true')
        document.getElementById('pw-overlay').style.display = 'flex';
});
</script>
