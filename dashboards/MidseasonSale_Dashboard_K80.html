// Populate family filter
const families = [...new Set(ALL_ITEMS.map(i => i.desc_fam))].sort();
const famSel = document.getElementById('fam-select');
families.forEach(f => {
    const o = document.createElement('option');
    o.value = f; o.textContent = f;
    famSel.appendChild(o);
});

function getFiltered() {
    const fam = famSel.value;
    const q = document.getElementById('search-input').value.toLowerCase().trim();
    return ALL_ITEMS.filter(i => {
        if (fam && i.desc_fam !== fam) return false;
        if (q && !i.referencia.toLowerCase().includes(q) &&
                 !i.article.toLowerCase().includes(q) &&
                 !i.subfamilia.toLowerCase().includes(q) &&
                 !i.desc_fam.toLowerCase().includes(q)) return false;
        return true;
    });
}

function render() {
    const items = getFiltered();
    const totalUnits = items.reduce((s, i) => s + i.stock, 0);
    const avgDisc = items.length ? Math.round(items.reduce((s, i) => s + i.disc, 0) / items.length * 100) : 0;

    document.getElementById('stat-items').textContent = items.length;
    document.getElementById('stat-units').textContent = totalUnits.toLocaleString('es-ES');
    document.getElementById('stat-disc').textContent = avgDisc + '%';

    const grid = document.getElementById('grid');
    if (!items.length) {
        grid.innerHTML = '<p style="color:#555;grid-column:1/-1;padding:40px 0;text-align:center">No hay artículos con estos filtros</p>';
        return;
    }

    grid.innerHTML = items.map(item => {
        const discPct = item.disc > 0 ? Math.round(item.disc * 100) : 0;
        const imgUrl = `https://koroshishop.com/cdn/shop/files/${item.referencia}_1.jpg`;
        return `
        <div class="card">
            <div class="image-wrapper">
                <img src="${imgUrl}" alt="${item.referencia}" class="image"
                     onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                <div class="no-image" style="display:none">Sin imagen</div>
                <div class="stock-badge">${item.stock} uds</div>
            </div>
            <div class="info">
                <div class="familia">${item.desc_fam}</div>
                <div class="subfam">${item.subfamilia}</div>
                <div class="article-ref">${item.article} · ${item.color}</div>
                <div class="prices">
                    <div class="price-row">
                        <span class="price-label">PVP</span>
                        <span class="pvp-val">€${item.pvp.toFixed(2)}</span>
                    </div>
                    <div class="price-row">
                        <span class="sale-val">€${item.sale.toFixed(2)}</span>
                        ${discPct > 0 ? `<span class="disc-badge">-${discPct}%</span>` : ''}
                    </div>
                </div>
            </div>
        </div>`;
    }).join('');
}

famSel.addEventListener('change', render);
document.getElementById('search-input').addEventListener('input', render);

// Download Excel
document.getElementById('download-btn').addEventListener('click', () => {
    const items = getFiltered();
    const data = items.map(i => ({
        'Artículo': i.article, 'Color': i.color, 'Referencia': i.referencia,
        'Familia': i.desc_fam, 'Subfamilia': i.subfamilia,
        'Stock': i.stock, 'PVP Original': i.pvp,
        'Precio Rebaja': i.sale, 'Descuento %': (i.disc * 100).toFixed(1)
    }));
    const ws = XLSX.utils.json_to_sheet(data);
    ws['!cols'] = [10,8,20,25,20,8,12,12,10].map(w => ({ wch: w }));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'K80 Midseason');
    XLSX.writeFile(wb, 'Midseason_Sale_K80_GranJonquera.xlsx');
});

// Download CSV
document.getElementById('download-csv').addEventListener('click', () => {
    const items = getFiltered();
    let csv = 'Artículo;Color;Referencia;Familia;Subfamilia;Stock;PVP Original;Precio Rebaja;Descuento %\n';
    items.forEach(i => {
        csv += [i.article, i.color, i.referencia, i.desc_fam, i.subfamilia,
                i.stock, i.pvp, i.sale, (i.disc*100).toFixed(1)].join(';') + '\n';
    });
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'Midseason_Sale_K80_GranJonquera.csv';
    a.click();
});

// Init
render();
</script>

    } else {
