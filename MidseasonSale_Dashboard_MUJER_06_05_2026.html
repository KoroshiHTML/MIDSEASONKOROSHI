                // Prepare data for Excel

                    'Artículo': item.article,
                    'Familia': item.familia,
                    'Sexo': item.sexo,
                    'Referencia': item.referencia,
                    'Color': item.color,
                    'Precio Actual': item.precio_actual,
                    'Precio Rebaja': item.precio_rebaja,
                    'Descuento %': (Math.abs(item.descuento) * 100).toFixed(2)
                }));

                // Create workbook
                const ws = XLSX.utils.json_to_sheet(excelData);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Midseason Sale");

                // Set column widths
                ws['!cols'] = [

                console.error('Download error:', error);
                alert('Error downloading file. Please try again.');
            }
        });

        // Download CSV function
        document.getElementById('download-csv-btn').addEventListener('click', function() {
            try {
                const headers = ['Artículo', 'Familia', 'Sexo', 'Referencia', 'Color', 'Precio Actual', 'Precio Rebaja', 'Descuento %'];
                
                let csv = headers.join(';') + '\n';
                
                items.forEach(item => {
                    csv += [
                        item.article,
                        item.familia,
                        item.sexo,
                        item.referencia,
                        item.color,
                        item.precio_actual,
                        item.precio_rebaja,
                        (Math.abs(item.descuento) * 100).toFixed(2)
                    ].join(';') + '\n';
                });

                // Create blob and download
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement('a');
                const url = URL.createObjectURL(blob);
                link.setAttribute('href', url);
                link.setAttribute('download', 'Midseason_Sale_V26.csv');
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                console.log('CSV file downloaded successfully');
            } catch (error) {
                console.error('Download error:', error);
                alert('Error downloading file. Please try again.');
            }
        });
